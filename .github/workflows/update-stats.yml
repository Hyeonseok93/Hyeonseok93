name: Update README cards

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-stats.yml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: update-readme-cards
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Hyeonseok93&show_icons=true&include_all_commits=true&all_time_contribs=true&hide_rank=true&theme=dark&hide_border=true&bg_color=0D1117&title_color=FFFFFF&text_color=C9D1D9
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Hyeonseok93&layout=compact&langs_count=8&theme=dark&hide_border=true&bg_color=0D1117&title_color=FFFFFF&text_color=C9D1D9
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize stat labels
        run: sed -i -e 's/ (last year)//g' profile/stats.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update README stats cards"
          git pull --rebase origin main
          git push
